<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robo-Arena Stream + WS HUD</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; font-family: monospace;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video, #overlay {
            position: absolute;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
            object-fit: contain;
        }

        #overlay { z-index: 2; pointer-events: none; }
        #video { z-index: 1; }

        .stats-overlay {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px; border-radius: 4px;
            color: #0f0; font-size: 11px;
            pointer-events: none; border: 1px solid #333;
            line-height: 1.4;
            z-index: 10;
        }
        .stat-val { color: #fff; font-weight: bold; }
        .status-tag { font-weight: bold; }
    </style>
</head>
<body>

    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay" width="1280" height="720"></canvas>
    </div>

    <div class="stats-overlay" id="stats-panel">
        <div>STREAM: <span id="status" class="stat-val">CONNECTING...</span></div>
        <div>TAGS WS: <span id="ws-status" class="status-tag" style="color:red">OFFLINE</span></div>
        <div>PING: <span id="ping" class="stat-val">--</span> ms | JITTER: <span id="jitter" class="stat-val">--</span> ms</div>
    </div>

    <script>
        const CONFIG = {
            domain: "miniserv.robo-arena.ru",
            streamHigh: "polygon_high",
            streamLow: "polygon_low",
            user: "bro",
            pass: "zaq1xsw2",
            tagsWsUrl: "wss://play.robo-arena.ru/ws-detect"
        };

        const ROBOT_MAP = { 'R1': 101, 'R2': 102, 'R3': 103, 'R4': 104 };

        // --- ПАРСИНГ ПАРАМЕТРОВ РОБОТОВ ---
        const urlParams = new URLSearchParams(window.location.search);
        const ids = urlParams.getAll('id');
        const names = urlParams.getAll('name');
        const colors = urlParams.getAll('color');

        const activeTargets = {};
        ids.forEach((id, i) => {
            const tagId = ROBOT_MAP[id.trim()];
            if (tagId) {
                activeTargets[tagId] = {
                    name: names[i] || id,
                    color: colors[i] || '#007AFF'
                };
            }
        });

        let currentStream = CONFIG.streamHigh;
        let pc = null;
        let statsInterval = null;
        let isSwitching = false;
        let latestTags = [];

        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');

        // --- WEBRTC (ВИДЕО ПОТОК) ---
        async function connectVideo() {
            if (pc) { pc.close(); pc = null; }

            document.getElementById('status').innerText = `CONNECTING...`;

            pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'turn:89.104.65.166:3478', username: 'robot', credential: 'arena_turn_2024' },
                    { urls: 'turn:91.229.8.26:3478', username: 'robot', credential: 'arena_turn_2024' }
                ]
            });

            pc.ontrack = (ev) => {
                const video = document.getElementById('video');
                video.srcObject = ev.streams[0] || new MediaStream([ev.track]);
                video.play().catch(() => {
                    document.getElementById('status').innerHTML = '<span style="color: #f0f;">TAP TO START</span>';
                    const start = () => { video.play(); window.removeEventListener('click', start); };
                    window.addEventListener('click', start);
                });
                document.getElementById('status').innerText = currentStream === CONFIG.streamHigh ? "LIVE (HD)" : "LIVE (SD)";
                startStats();
            };

            pc.addTransceiver('video', {direction: 'recvonly'});
            pc.addTransceiver('audio', {direction: 'recvonly'});

            const wsUrl = `wss://${CONFIG.user}:${CONFIG.pass}@${CONFIG.domain}/api/ws?src=${currentStream}`;
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                pc.onicecandidate = ev => ev.candidate && ws.send(JSON.stringify({type: 'webrtc/candidate', value: ev.candidate.candidate}));
                pc.createOffer().then(offer => pc.setLocalDescription(offer)).then(() => {
                    ws.send(JSON.stringify({type: 'webrtc/offer', value: pc.localDescription.sdp}));
                });
            };

            ws.onmessage = async (ev) => {
                const msg = JSON.parse(ev.data);
                if (msg.type === 'webrtc/answer') await pc.setRemoteDescription({type: 'answer', sdp: msg.value});
                else if (msg.type === 'webrtc/candidate') await pc.addIceCandidate({candidate: msg.value, sdpMid: '0'});
            };

            ws.onclose = () => !isSwitching && setTimeout(connectVideo, 3000);
        }

        // --- WEBSOCKET (ДАННЫЕ МЕТОК) ---
        function connectTagsWS() {
            const wsTags = new WebSocket(CONFIG.tagsWsUrl);
            const statusEl = document.getElementById('ws-status');

            wsTags.onopen = () => {
                statusEl.innerText = "ONLINE";
                statusEl.style.color = "#0f0";
            };

            wsTags.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    latestTags = data.tags || [];
                } catch (e) {}
            };

            wsTags.onclose = () => {
                statusEl.innerText = "OFFLINE";
                statusEl.style.color = "red";
                setTimeout(connectTagsWS, 2000);
            };
        }

        // --- ОБРАБОТКА СТАТИСТИКИ И ПЕРЕКЛЮЧЕНИЕ КАЧЕСТВА ---
        let lastFramesDecoded = 0;
        let blackScreenTimer = 0;

        function startStats() {
            if (statsInterval) clearInterval(statsInterval);
            let lastPacketsLost = 0;

            statsInterval = setInterval(async () => {
                if (!pc || pc.signalingState === "closed") return;
                const stats = await pc.getStats();
                stats.forEach(report => {
                    if (report.type === 'candidate-pair' && report.state === 'succeeded') {
                        document.getElementById('ping').innerText = Math.round(report.currentRoundTripTime * 1000);
                    }
                    if (report.type === 'inbound-rtp' && report.kind === 'video') {
                        document.getElementById('jitter').innerText = Math.round(report.jitter * 1000);

                        // Детекция зависания картинки
                        if (report.framesDecoded === lastFramesDecoded) blackScreenTimer++;
                        else blackScreenTimer = 0;
                        lastFramesDecoded = report.framesDecoded;

                        if (blackScreenTimer >= 5) { // 5 сек нет новых кадров
                            blackScreenTimer = 0;
                            connectVideo();
                        }

                        // Авто-переключение на Low при плохой связи
                        const losses = report.packetsLost - lastPacketsLost;
                        lastPacketsLost = report.packetsLost;
                        if (losses > 30 && currentStream === CONFIG.streamHigh) {
                            currentStream = CONFIG.streamLow;
                            isSwitching = true;
                            connectVideo().then(() => isSwitching = false);
                        }
                    }
                });
            }, 1000);
        }

        // --- ОТРИСОВКА HUD ---
        function hudLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            latestTags.forEach(tag => {
                const target = activeTargets[tag.id];
                if (target) {
                    drawMarker(tag, target.name, target.color);
                }
            });

            requestAnimationFrame(hudLoop);
        }

        function drawMarker(tag, name, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;

            // 1. Рамка робота
            ctx.beginPath();
            tag.corners.forEach((c, i) => i === 0 ? ctx.moveTo(c[0], c[1]) : ctx.lineTo(c[0], c[1]));
            ctx.closePath();
            ctx.stroke();

            // 2. Настройка текста
            const fontSize = 16;
            ctx.font = `bold ${fontSize}px 'Segoe UI', Arial, sans-serif`;
            const tw = ctx.measureText(name).width;
            const pad = 6;
            const x = tag.center[0];
            const y = tag.center[1] - 55;

            // Подложка
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(x - tw/2 - pad, y - fontSize, tw + pad*2, fontSize + pad);

            // Рамка подписи
            ctx.lineWidth = 2;
            ctx.strokeRect(x - tw/2 - pad, y - fontSize, tw + pad*2, fontSize + pad);

            // Текст
            ctx.fillStyle = "#fff"; // Текст белый для читаемости
            ctx.textAlign = "center";
            ctx.fillText(name, x, y);

            // Линия-указатель к центру
            ctx.beginPath();
            ctx.moveTo(x, y + pad);
            ctx.lineTo(x, tag.center[1] - 15);
            ctx.strokeStyle = color;
            ctx.stroke();
        }

        // --- ЗАПУСК ---
        connectVideo();
        connectTagsWS();
        hudLoop();
    </script>
</body>
</html>
